<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>S+L Leadership KPIs — FY 2025/26</title>
<style>
  :root {
    --navy: #1B3A6B;
    --orange: #E87722;
    --green: #1D7A4A;
    --teal: #0D7377;
    --dark: #1C1C2E;
    --gray: #4A5568;
    --red: #DC2626;
    --bg-blue: #EBF3FB;
    --bg-green: #E8F5EE;
    --bg-orange: #FEF3E8;
    --bg-red: #FDEDED;
    --bg-gray: #F5F7FA;
    --hdr-blue: #CADCFC;
    --track: #E2E8F0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-gray);
    color: var(--dark);
    line-height: 1.5;
  }
  header { background: var(--navy); color: #fff; padding: 32px 24px 0; }
  nav { max-width: 1180px; margin: 20px auto 0; display: flex; gap: 4px; }
  nav a {
    color: #B0C4E8; text-decoration: none; font-size: 14px; font-weight: 600;
    padding: 10px 18px; border-radius: 8px 8px 0 0;
  }
  nav a.active { background: var(--bg-gray); color: var(--navy); }
  nav a:not(.active):hover { background: rgba(255,255,255,.08); color: #fff; }
  .header-inner { max-width: 1180px; margin: 0 auto; }
  .brand { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: var(--hdr-blue); font-weight: 600; }
  header h1 { font-size: 28px; margin-top: 6px; font-weight: 700; }
  .asof { margin-top: 8px; font-size: 14px; color: #B0C4E8; }
  main { max-width: 1180px; margin: 0 auto; padding: 28px 24px 56px; }

  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 12px; }
  .stat {
    background: #fff; border-radius: 10px; padding: 18px 16px;
    border-top: 4px solid var(--gray);
    box-shadow: 0 1px 3px rgba(28,28,46,.08);
  }
  .stat .num { font-size: 32px; font-weight: 800; }
  .stat .lbl { font-size: 12.5px; text-transform: uppercase; letter-spacing: 1px; color: var(--gray); font-weight: 600; margin-top: 2px; }
  .stat.green  { border-top-color: var(--green); }  .stat.green .num  { color: var(--green); }
  .stat.orange { border-top-color: var(--orange); } .stat.orange .num { color: var(--orange); }
  .stat.red    { border-top-color: var(--red); }    .stat.red .num    { color: var(--red); }
  .stat.gray   { border-top-color: var(--gray); }   .stat.gray .num   { color: var(--gray); }

  .progress-wrap { background:#fff; border-radius:10px; padding:18px 20px; box-shadow:0 1px 3px rgba(28,28,46,.08); margin-bottom:32px; }
  .progress-wrap .plabel { font-size:13px; font-weight:600; color:var(--gray); margin-bottom:10px; }
  .bar { display:flex; height:14px; border-radius:7px; overflow:hidden; }
  .bar div { height:100%; }

  section { margin-bottom: 34px; }
  h2 {
    font-size: 17px; color: var(--navy); text-transform: uppercase; letter-spacing: 1.5px;
    border-bottom: 3px solid var(--teal); padding-bottom: 8px; margin-bottom: 16px;
  }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; }
  .card {
    background: #fff; border-radius: 10px; padding: 18px 18px 16px;
    box-shadow: 0 1px 3px rgba(28,28,46,.08);
    border-top: 4px solid var(--gray);
    display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center;
  }
  .card.green  { border-top-color: var(--green); }
  .card.orange { border-top-color: var(--orange); }
  .card.red    { border-top-color: var(--red); }
  .card.gray   { border-top-color: var(--gray); }
  .kpi-title { font-weight: 700; font-size: 14.5px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
  .gauge { width: 190px; }
  .gauge-value { font-size: 26px; font-weight: 800; margin-top: -4px; }
  .gauge-value.green  { color: var(--green); }
  .gauge-value.orange { color: var(--orange); }
  .gauge-value.red    { color: var(--red); }
  .gauge-value.gray   { color: var(--gray); }
  .gauge-target { font-size: 12px; color: var(--gray); font-weight: 600; }
  .pill {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .8px; padding: 3px 10px; border-radius: 20px; margin-top: 2px;
  }
  .pill.green  { background: var(--bg-green);  color: var(--green); }
  .pill.orange { background: var(--bg-orange); color: var(--orange); }
  .pill.red    { background: var(--bg-red);    color: var(--red); }
  .pill.gray   { background: var(--bg-gray);   color: var(--gray); border: 1px solid var(--track); }
  .prog { font-size: 12.5px; color: var(--gray); margin-top: 4px; }
  footer { text-align: center; font-size: 12px; color: var(--gray); padding-bottom: 40px; }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="brand">Stash + Lode</div>
    <h1>Leadership Team KPIs — FY 2025/26</h1>
    <div class="asof">Progress as at June 2026</div>
  </div>
  <nav>
    <a href="index.html" class="active">KPI Dashboard</a>
    <a href="capability.html">Safety, Capability &amp; HR</a>
  </nav>
</header>
<main>
  <div class="summary" id="summary"></div>
  <div class="progress-wrap">
    <div class="plabel" id="plabel"></div>
    <div class="bar" id="bar"></div>
  </div>
  <div id="sections"></div>
</main>
<footer>Stash + Lode — Leadership KPI Dashboard · FY 2025/26 · Updated June 2026</footer>
<script>
const STATUS = {
  green:  "Completed",
  orange: "Partially completed",
  red:    "Not completed",
  gray:   "Pending result"
};

/*
 Each KPI:
 - value/target/unit → numeric gauge (needle = % of target attained, capped at 100%)
 - invert:true → "lower is better" (target is a ceiling); attainment is 100% when value ≤ target
 - no value → qualitative gauge: needle by status (completed 100%, partial 50%, not 12%, pending 0)
 - display → override for the big centre figure
*/
const DATA = [
  { section: "Operations", kpis: [
    { kpi: "≥ 75% fleet utilisation", status: "green", value: 80.3, target: 75, unit: "%", tlabel: "Target ≥ 75%", progress: "FY 25/26 utilisation is 80.3%" },
    { kpi: "≥ 95% on-time departure (first job)", status: "red", value: 81.03, target: 95, unit: "%", tlabel: "Target ≥ 95%", progress: "OTD for FY25/26 is 81.03%" },
    { kpi: "≤ 3% damage incident rate", status: "green", value: 0.5, target: 3, unit: "%", invert: true, tlabel: "Target ≤ 3%", progress: "Damage incident rate for FY25/26 is 0.5%" },
    { kpi: "≥ 90% damage claims resolved <14 days", status: "gray", tlabel: "Target ≥ 90%", progress: "Still awaiting final results" },
    { kpi: "≥ 97% MSU readiness ratio", status: "green", value: 100, target: 97, unit: "%", tlabel: "Target ≥ 97%", progress: "FY 25/26 MSU readiness is 100%" }
  ]},
  { section: "People & Training", kpis: [
    { kpi: "Video-based training for removalists & MSU packers", status: "red", progress: "No suitable downtime was available to begin filming in FY25/26" },
    { kpi: "Secure all yards with centralised access control", status: "orange", progress: "CCTV upgrade complete (May 2026) — 10 cameras installed. Access control system decision pending." },
    { kpi: "Maintain ≥ 3 fully trained MSU logistics operators", status: "green", value: 4, target: 3, unit: "", tlabel: "Target ≥ 3", progress: "Total current fully trained MSU operators: 4" }
  ]},
  { section: "Storage Performance", kpis: [
    { kpi: "Average STO conversion ≥ 30%", status: "red", value: 19.25, target: 30, unit: "%", tlabel: "Target ≥ 30%", progress: "Average STO conversion in FY 25/26 is 19.25%" },
    { kpi: "MSU occupancy ≥ 85% (post-delivery)", status: "red", value: 80, target: 85, unit: "%", tlabel: "Target ≥ 85%", progress: "MSU occupancy: 80% — reflects 96 new units added to fleet; recovery underway" },
    { kpi: "MSU occupancy ≥ 85% avg per year", status: "green", value: 94.9, target: 85, unit: "%", tlabel: "Target ≥ 85%", progress: "FY 25/26 average MSU occupancy is 94.9%" },
    { kpi: "MSUs sold per week: 7.5 per depot", status: "green", value: 12.3, target: 7.5, unit: "", tlabel: "Target ≥ 7.5/wk", progress: "June avg weekly MSU sales: ~12.3 (53 move-ins / 4.3 weeks)" },
    { kpi: "2.5 MSU labour jobs per week", status: "red", value: 1.875, target: 2.5, unit: "", tlabel: "Target ≥ 2.5/wk", progress: "Average MSU labour jobs per week in FY25/26 is 1.875" }
  ]},
  { section: "Sales & Business Development", kpis: [
    { kpi: "Convert 20 companies from B2B list to partners", status: "green", value: 22, target: 20, unit: "", tlabel: "Target ≥ 20", progress: "22 business partnerships confirmed (maintained from May)" },
    { kpi: "Create B2B metrics document", status: "green", progress: "Document created" }
  ]},
  { section: "Technology & Systems", kpis: [
    { kpi: "MS Teams calling — click-to-call & transcription", status: "green", progress: "Live since May 2026. Ongoing embedding into sales workflow." },
    { kpi: "Integrate systems into single pane of glass (SPOG)", status: "red", progress: "Project SPOG Phase 1 remains in progress — significantly delayed" },
    { kpi: "Further automate Sophiie AI assistant", status: "orange", progress: "TBC upon completion of SPOG Phase 1" },
    { kpi: "Website upgrade", status: "red", progress: "TBC upon completion of SPOG Phase 1" },
    { kpi: "Incorporate access control into single platform", status: "red", progress: "Awaiting decision on access control system" }
  ]}
];

const COLORS = { green: "#1D7A4A", orange: "#E87722", red: "#DC2626", gray: "#4A5568" };
const QUAL_FRAC = { green: 1, orange: 0.5, red: 0.12, gray: 0 };
const QUAL_LABEL = { green: "Done", orange: "In progress", red: "Not done", gray: "TBC" };

function attainment(k) {
  if (k.value === undefined) return QUAL_FRAC[k.status];
  if (k.invert) return k.value <= k.target ? 1 : Math.max(0, Math.min(1, k.target / k.value));
  return Math.max(0, Math.min(1, k.value / k.target));
}

// Semicircular gauge: track + coloured arc + needle + tick marks
function gauge(k) {
  const f = attainment(k);
  const color = COLORS[k.status];
  const cx = 100, cy = 95, r = 72;
  const circ = Math.PI * r; // semicircle length

  // needle angle: 180deg (left) -> 0deg (right)
  const ang = Math.PI * (1 - f);
  const nx = cx + Math.cos(ang) * (r - 14);
  const ny = cy - Math.sin(ang) * (r - 14);

  // tick marks every 25%
  let ticks = "";
  for (let i = 0; i <= 4; i++) {
    const ta = Math.PI * (1 - i / 4);
    const x1 = cx + Math.cos(ta) * (r + 4), y1 = cy - Math.sin(ta) * (r + 4);
    const x2 = cx + Math.cos(ta) * (r + 10), y2 = cy - Math.sin(ta) * (r + 10);
    ticks += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#CBD5E0" stroke-width="2"/>`;
  }

  return `
  <svg class="gauge" viewBox="0 0 200 112" xmlns="http://www.w3.org/2000/svg">
    ${ticks}
    <path d="M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}" fill="none" stroke="var(--track)" stroke-width="14" stroke-linecap="round"/>
    <path d="M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}" fill="none" stroke="${color}" stroke-width="14" stroke-linecap="round"
      stroke-dasharray="${(f * circ).toFixed(1)} ${circ.toFixed(1)}"/>
    <line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="#1C1C2E" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="6" fill="#1C1C2E"/>
    <text x="${cx - r}" y="${cy + 14}" font-size="10" fill="#4A5568" text-anchor="middle">0%</text>
    <text x="${cx + r}" y="${cy + 14}" font-size="10" fill="#4A5568" text-anchor="middle">100%</text>
  </svg>`;
}

function centreValue(k) {
  if (k.display) return k.display;
  if (k.value !== undefined) return k.value + (k.unit || "");
  return QUAL_LABEL[k.status];
}

const counts = { green: 0, orange: 0, red: 0, gray: 0 };
DATA.forEach(s => s.kpis.forEach(k => counts[k.status]++));
const total = Object.values(counts).reduce((a, b) => a + b, 0);

document.getElementById("summary").innerHTML = ["green","orange","red","gray"].map(c =>
  `<div class="stat ${c}"><div class="num">${counts[c]}</div><div class="lbl">${STATUS[c]}</div></div>`
).join("");

document.getElementById("bar").innerHTML = ["green","orange","red","gray"].map(c =>
  `<div style="width:${(counts[c]/total*100).toFixed(1)}%;background:${COLORS[c]}"></div>`
).join("");
document.getElementById("plabel").textContent =
  `${counts.green} of ${total} KPIs completed (${Math.round(counts.green/total*100)}%)`;

document.getElementById("sections").innerHTML = DATA.map(s => `
  <section>
    <h2>${s.section}</h2>
    <div class="cards">
      ${s.kpis.map(k => `
        <div class="card ${k.status}">
          <div class="kpi-title">${k.kpi}</div>
          ${gauge(k)}
          <div class="gauge-value ${k.status}">${centreValue(k)}</div>
          ${k.tlabel ? `<div class="gauge-target">${k.tlabel}</div>` : ""}
          <span class="pill ${k.status}">${STATUS[k.status]}</span>
          <div class="prog">${k.progress}</div>
        </div>`).join("")}
    </div>
  </section>`).join("");
</script>
</body>
</html>
